<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Shop</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">MyShop</div>
        <input id="search" type="text" placeholder="Search products...">
        <div class="cart-btn" onclick="toggleCart()">
            <button type="button" onclick="showLogin()">Login</button>
            <i class="fa-regular fa-heart"></i>
            <span id="wishlist-count">0</span>
            <i class="fa fa-shopping-cart"></i>
            <span id="cart-count">0</span>
        </div>
    </header>
    <section class="products" id="product-list"></section>
     <!-- Cart Sidebar-->
    <div class="cart" id="cart">
        <h2>your cart</h2>
        <ul id="cart-items"></ul>
        <h3>Total: <span id="cart-total">0</span></h3>
        <button  type='button' onclick="checkout()">Checkout</button>
    </div>
    <!-- Login -->
    <div id="login-box" class="login-box">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button type="button" onclick="login()">Login</button>
        <button type="button"style="text-align: center; margin-top: 15px; cursor: pointer;" onclick="document.getElementById('login-box').classList.remove('active')">✕ Close</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
